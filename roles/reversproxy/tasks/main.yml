- name: Create Caddy directory
  ansible.builtin.file:
    path: "{{ panel_docker_dir }}/caddy"
    state: directory
    mode: '0755'

- name: Create Caddyfile
  ansible.builtin.file:
    path: "{{ panel_docker_dir }}/caddy/Caddyfile"
    state: touch
    mode: '0644'

- name: Create Caddyfile content
  ansible.builtin.copy:
    dest: "{{ panel_docker_dir }}/caddy/Caddyfile"
    content: |
        {{ panel_domain }}
        {
          reverse_proxy * http://remnawave:3000
        }
        :443
        {
          tls internal
          respond 204
        }

- name: Create docker-compose.yml for Caddy
  ansible.builtin.copy:
    dest: "{{ panel_docker_dir }}/caddy/docker-compose.yml"
    content: |
      services:
        caddy:
        image: caddy:2.9
        container_name: 'caddy'
        hostname: caddy
        restart: always
        ports:
            - '0.0.0.0:443:443'
            - '0.0.0.0:80:80'
        networks:
            - remnawave-network
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - caddy-ssl-data:/data

        networks:
            remnawave-network:
                name: remnawave-network
                driver: bridge
                external: true

        volumes:
            caddy-ssl-data:
                driver: local
                external: false
                name: caddy-ssl-data

- name: Start Caddy container
  ansible.builtin.command: docker compose up -d && docker compose logs -f -t
