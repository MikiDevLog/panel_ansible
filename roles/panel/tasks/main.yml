---
- name: Create panel directory
  ansible.builtin.file:
    path: "{{ panel_docker_dir }}"
    state: directory
    mode: '0755'

- name: Download panel
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/remnawave/backend/refs/heads/main/docker-compose-prod.yml"
    dest: "{{ panel_docker_dir }}/docker-compose.yml"
    mode: '0644'

- name: Get .env file
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/remnawave/backend/refs/heads/main/.env.sample"
    dest: "{{ panel_docker_dir }}/.env"
    mode: '0644'

- name: Generate JWT secrets
  ansible.builtin.shell: |
    openssl rand -hex 64
  register: jwt_secret
  changed_when: false

- name: Generate JWT API tokens secret
  ansible.builtin.shell: |
    openssl rand -hex 64
  register: jwt_api_tokens_secret
  changed_when: false

- name: Generate METRICS_PASS
  ansible.builtin.shell: |
    openssl rand -hex 64
  register: metrics_pass
  changed_when: false

- name: Generate WEBHOOK_SECRET_HEADER
  ansible.builtin.shell: |
    openssl rand -hex 64
  register: webhook_secret_header
  changed_when: false

- name: Generate POSTGRES_PASSWORD
  ansible.builtin.shell: |
    openssl rand -hex 24
  register: postgres_password
  changed_when: false

- name: Update JWT_AUTH_SECRET in .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: "^JWT_AUTH_SECRET=.+"
    replace: "JWT_AUTH_SECRET={{ jwt_secret.stdout }}"

- name: Update JWT_API_TOKENS_SECRET in .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: "^JWT_API_TOKENS_SECRET=.+"
    replace: "JWT_API_TOKENS_SECRET={{ jwt_api_tokens_secret.stdout }}"

- name: Update METRICS_PASS in .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: "^METRICS_PASS=.+"
    replace: "METRICS_PASS={{ metrics_pass.stdout }}"

- name: Update WEBHOOK_SECRET_HEADER in .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: "^WEBHOOK_SECRET_HEADER=.+"
    replace: "WEBHOOK_SECRET_HEADER={{ webhook_secret_header.stdout }}"

- name: Update POSTGRES_PASSWORD in .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: "^POSTGRES_PASSWORD=.+"
    replace: "POSTGRES_PASSWORD={{ postgres_password.stdout }}"

- name: Update DATABASE_URL in .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: '^DATABASE_URL=.+'
    replace: 'DATABASE_URL="postgresql://postgres:{{ postgres_password.stdout }}@remnawave-db:5432/postgres"'

- name: Update domain name .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: "^FRONT_END_DOMAIN=.+"
    replace: "FRONT_END_DOMAIN={{ panel_domain }}"

- name: Update subscription path name .env
  ansible.builtin.replace:
    path: "{{ panel_docker_dir }}/.env"
    regexp: "^SUB_PUBLIC_DOMAIN=.+"
    replace: "SUB_PUBLIC_DOMAIN={{ subscription_domain }}"

- name: Start panel containers
  community.docker.docker_compose_v2:
    project_src: "{{ panel_docker_dir }}"
    state: present
  become_user: "{{ ansible_user }}"
