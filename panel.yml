---
- hosts: all
  become: true
  vars_prompt:
    - name: ansible_host
      prompt: "Enter host ip"
      private: false

    - name: ansible_ssh_private_key_file
      prompt: "Enter path to SSH private key file. Usually /home/user/.ssh/id_rsa"
      private: false

    - name: ansible_user
      prompt: "Enter host name"
      private: false

    - name: panel_docker_dir
      prompt: "Enter path to panel docker directory. Usually /opt/remnawave"
      private: false

    - name: ansible_become_password
      prompt: "Enter host password"
      private: true

  roles:
    - packages
    - docker
    - panel
    - reversproxy
  post_tasks:
    - name: Complete message
      ansible.builtin.debug:
        msg: |
          Done.
